<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make10++</title>
  <!-- Google Fonts: Outfit & JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Outfit:wght@100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=3">
  <!-- MathLive & Compute Engine -->
  <script type="module">import "https://unpkg.com/mathlive";</script>
  <script src="https://unpkg.com/@cortex-js/compute-engine"></script>
  <!-- Canvas Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo">
        <span class="logo-math">Make10</span>
        <span class="logo-make10">++</span>
      </div>
      <button id="settings-btn" class="secondary-btn api-settings-btn" aria-label="設定" data-i18n-aria-label="settings_btn_aria">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          style="margin-right: 6px;">
          <path
            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z">
          </path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <span data-i18n="settings_btn">設定</span>
      </button>
    </header>

    <main class="game-board glass-panel">
      <!-- コントロールパネル -->
      <section class="control-panel">
        <div class="mode-select-wrapper">
          <label for="difficulty-select" class="control-label" data-i18n="difficulty_label">難易度</label>
          <select id="difficulty-select" class="custom-select">
            <option value="easy" data-i18n="easy">Easy (四則演算)</option>
            <option value="medium" selected data-i18n="medium">Medium (標準)</option>
            <option value="hard" data-i18n="hard">Hard (難問)</option>
            <option value="custom" data-i18n="custom">Custom (自由設定)</option>
          </select>
        </div>
        <button id="generate-btn" class="primary-btn">
          <span data-i18n="generate_btn">新規生成</span>
        </button>
      </section>

      <!-- カスタム入力エリア（通常時は非表示） -->
      <section id="custom-numbers-section" class="custom-numbers-section hidden">
        <p class="section-desc" data-i18n="custom_desc">使いたい4つの数字を入力してください（0〜9）</p>
        <div class="custom-inputs">
          <input type="number" min="0" max="9" class="custom-digit-input" value="1">
          <input type="number" min="0" max="9" class="custom-digit-input" value="2">
          <input type="number" min="0" max="9" class="custom-digit-input" value="3">
          <input type="number" min="0" max="9" class="custom-digit-input" value="4">
        </div>
        <button id="apply-custom-btn" class="secondary-btn" data-i18n="apply_btn">適用</button>
      </section>

      <!-- 使える数字セクション -->
      <section class="numbers-section">
        <h2 class="section-title" data-i18n="available_digits">使える数字</h2>
        <div id="numbers-container" class="numbers-container">
          <div class="digit-card" data-index="0">-</div>
          <div class="digit-card" data-index="1">-</div>
          <div class="digit-card" data-index="2">-</div>
          <div class="digit-card" data-index="3">-</div>
        </div>
      </section>

      <!-- 数式入力セクション -->
      <section class="input-section">
        <div class="input-header">
          <h2 class="section-title" data-i18n="formula_input">数式入力</h2>
          <div class="input-actions">
            <button id="clear-btn" class="text-btn" data-i18n="clear_btn">クリア</button>
            <button id="evaluate-btn" class="primary-btn evaluate-btn">
              <span data-i18n="evaluate_btn">判定する</span>
            </button>
          </div>
        </div>
        <div class="math-field-container">
          <math-field id="mf" placeholder="ここに数式を入力 (例: 8 / (1 - 1/5))" data-i18n-placeholder="math_field_placeholder"></math-field>
        </div>
      </section>

      <!-- 結果・ステータスセクション -->
      <section class="results-section">
        <div class="result-card" id="status-card">
          <div class="result-row">
            <span class="result-label" data-i18n="current_value_label">現在の値</span>
            <span id="current-value" class="result-value">---</span>
          </div>
          <div id="feedback-msg" class="feedback-msg" data-i18n="msg_enter_formula">数式を入力してください</div>
        </div>

        <div class="details-accordion">
          <details>
            <summary data-i18n="debug_info">詳細情報 (デバッグ)</summary>
            <div class="accordion-content">
              <div class="info-row">
                <span class="info-label" data-i18n="latex_expr">LaTeX 表現:</span>
                <code id="latex-code" class="code-box"></code>
              </div>
              <div class="info-row">
                <span class="info-label" data-i18n="eval_engine">評価エンジン:</span>
                <span id="engine-used" class="info-val">Compute Engine (Local)</span>
              </div>
            </div>
          </details>
        </div>
      </section>
    </main>
  </div>

  <!-- 設定モーダル -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-content glass-panel">
      <div class="modal-header">
        <h3 data-i18n="settings_title">ゲーム設定</h3>
        <button id="close-settings-btn" class="icon-btn" aria-label="閉じる" data-i18n-aria-label="close_settings_btn_aria">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="lang-select" class="setting-label" data-i18n="lang_label">言語 / Language</label>
          <select id="lang-select" class="custom-select">
            <option value="ja">日本語</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="setting-group">
          <label for="theme-select" class="setting-label" data-i18n="theme_label">カラーテーマ</label>
          <select id="theme-select" class="custom-select">
            <option value="system" data-i18n="theme_system">システム設定に従う</option>
            <option value="light" data-i18n="theme_light">ライトモード</option>
            <option value="dark" data-i18n="theme_dark">ダークモード</option>
          </select>
        </div>
        <div class="setting-group checkbox-group">
          <label class="setting-checkbox-label">
            <input type="checkbox" id="sort-numbers-checkbox">
            <span data-i18n="sort_label">使える数字を小さい順に並べ替えて表示する</span>
          </label>
        </div>
        <div class="setting-group">
          <label for="api-key-input" class="setting-label" data-i18n="api_key_label">Gemini API キー (任意)</label>
          <input type="password" id="api-key-input" placeholder="AIによる高度な数式評価用 API キーを入力してください" class="text-input" data-i18n-placeholder="api_key_placeholder">
          <p class="setting-help" data-i18n="api_key_help">
            APIキーを設定すると、SymPyで計算できない超複雑な数式（一部の極限、解析的に解けない積分、任意の特殊関数など）をGeminiが正しく判定できるようになります。
            ※キーはブラウザのLocalStorageにのみ保存されます。
          </p>
        </div>
        <div class="setting-group">
          <label for="backend-url-input" class="setting-label" data-i18n="backend_url_label">バックエンドサーバー URL</label>
          <input type="text" id="backend-url-input" value="http://localhost:8000" class="text-input">
        </div>
      </div>
      <div class="modal-footer">
        <button id="save-settings-btn" class="primary-btn" data-i18n="save_btn">保存する</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/script.js?v=7"></script>
</body>

</html>
